services:
  # ============================================
  # PostgreSQL - Voter Registry Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    pull_policy: missing
    container_name: election-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-election_db}
      POSTGRES_USER: ${POSTGRES_USER:-election_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql
    networks:
      - election-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-election_admin}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MongoDB - Audit Logs & Events
  # ============================================
  mongodb:
    image: mongo:6
    pull_policy: missing
    container_name: election-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-mongo_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-changeme_mongo_password}
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - election-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis - Caching Layer
  # ============================================
  redis:
    image: redis:7-alpine
    pull_policy: missing
    container_name: election-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - election-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MQTT Broker - IoT Terminal Communication
  # ============================================
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    pull_policy: missing
    container_name: election-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infrastructure/docker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    networks:
      - election-network
    healthcheck:
      test: [ "CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Hyperledger Fabric - Orderer
  # ============================================
  orderer.election.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.election.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    working_dir: /root
    command: orderer
    volumes:
      - ./blockchain/network/crypto-config/ordererOrganizations/election.com/orderers/orderer.election.com/msp:/var/hyperledger/orderer/msp
      - ./blockchain/network/crypto-config/ordererOrganizations/election.com/orderers/orderer.election.com/tls:/var/hyperledger/orderer/tls
      - orderer_data:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
      - "7053:7053"
    networks:
      - election-network

  # ============================================
  # Hyperledger Fabric - Peer (Election Commission)
  # ============================================
  peer0.electioncommission.election.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.electioncommission.election.com
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=election-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.electioncommission.election.com
      - CORE_PEER_ADDRESS=peer0.electioncommission.election.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.electioncommission.election.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.electioncommission.election.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.electioncommission.election.com:7051
      - CORE_PEER_LOCALMSPID=ElectionCommissionMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.electioncommission.election.com:9444
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0electioncommission"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    volumes:
      - ./blockchain/network/crypto-config/peerOrganizations/electioncommission.election.com/peers/peer0.electioncommission.election.com/msp:/etc/hyperledger/fabric/msp
      - ./blockchain/network/crypto-config/peerOrganizations/electioncommission.election.com/peers/peer0.electioncommission.election.com/tls:/etc/hyperledger/fabric/tls
      - /var/run/docker.sock:/host/var/run/docker.sock
      - peer0_electioncommission_data:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
      - "7051:7051"
      - "9444:9444"
    networks:
      - election-network
    depends_on:
      - orderer.election.com

  # ============================================
  # Backend API Server
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: election-backend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${BACKEND_PORT:-3000}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-election_db}
      - POSTGRES_USER=${POSTGRES_USER:-election_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_secure_password}
      - MONGODB_URI=mongodb://${MONGODB_USER:-mongo_admin}:${MONGODB_PASSWORD:-changeme_mongo_password}@mongodb:27017/election_logs?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme_redis_password}
      - MQTT_BROKER_URL=mqtt://mqtt-broker:1883
      - JWT_SECRET=${JWT_SECRET:-changeme_random_256bit_secret_key_here}
      - FABRIC_PEER_ENDPOINT=peer0.electioncommission.election.com:7051
      - FABRIC_ORDERER_ENDPOINT=orderer.election.com:7050
    ports:
      - "3000:3000"
      - "3100:3100"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./blockchain/network/crypto-config:/crypto-config
    networks:
      - election-network
    depends_on:
      - postgres
      - mongodb
      - redis
      - mqtt-broker
      - peer0.electioncommission.election.com
    command: npm start

  # ============================================
  # ML Analytics Service (Python)
  # ============================================
  ml-analytics:
    build:
      context: ./ml-service
      dockerfile: ../infrastructure/docker/Dockerfile.ml
    container_name: election-ml-analytics
    environment:
      - MONGODB_URI=mongodb://${MONGODB_USER:-mongo_admin}:${MONGODB_PASSWORD:-changeme_mongo_password}@mongodb:27017/election_logs?authSource=admin
      - ML_MODEL_PATH=/app/src/models/voting_patterns.pkl
      - ANOMALY_THRESHOLD=${ANOMALY_THRESHOLD:-0.85}
    ports:
      - "5001:5000"
    volumes:
      - ./ml-service:/app
      - ml_models:/app/src/models
    networks:
      - election-network
    depends_on:
      - mongodb
    command: python api.py

  # ============================================
  # Voter UI (Frontend)
  # ============================================
  voter-ui:
    build:
      context: ./voter-ui
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    container_name: election-voter-ui
    environment:
      - VITE_API_URL=http://localhost:3000/api
      - VITE_WS_URL=ws://localhost:3100
    ports:
      - "3001:3001"
    volumes:
      - ./voter-ui:/app
      - /app/node_modules
    networks:
      - election-network
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3001

  # ============================================
  # Observer Dashboard (Frontend)
  # ============================================
  observer-dashboard:
    build:
      context: ./observer-dashboard
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    container_name: election-observer-dashboard
    environment:
      - VITE_API_URL=http://localhost:3000/api
      - VITE_WS_URL=ws://localhost:3100
    ports:
      - "3002:3002"
    volumes:
      - ./observer-dashboard:/app
      - /app/node_modules
    networks:
      - election-network
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3002

  # ============================================
  # Admin Portal (Frontend)
  # ============================================
  admin-portal:
    build:
      context: ./admin-portal
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    container_name: election-admin-portal
    environment:
      - VITE_API_URL=http://localhost:3000/api
      - VITE_WS_URL=ws://localhost:3100
    ports:
      - "3003:3003"
    volumes:
      - ./admin-portal:/app
      - /app/node_modules
    networks:
      - election-network
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3003

  # ============================================
  # Prometheus - Monitoring
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: election-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - election-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # ============================================
  # Grafana - Visualization
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: election-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./infrastructure/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3004:3000"
    networks:
      - election-network
    depends_on:
      - prometheus

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  mqtt_data:
  mqtt_logs:
  orderer_data:
  peer0_electioncommission_data:
  ml_models:
  prometheus_data:
  grafana_data:

    # ============================================
    # Networks
    # ============================================
networks:
  election-network:
    name: election-network
    driver: bridge
