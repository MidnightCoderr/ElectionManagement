openapi: 3.0.3
info:
  title: Secure Election Management System API
  description: |
    Blockchain-based election management system with biometric authentication,
    IoT terminals, and ML fraud detection.
    
    ## Authentication
    Most endpoints require JWT authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your_jwt_token>
    ```
    
    ## Rate Limiting
    - 100 requests per 15 minutes per IP
    - Voting endpoints: 10 requests per hour per voter
    
    ## Error Responses
    All error responses follow this format:
    ```json
    {
      "success": false,
      "message": "Error description",
      "error": "Detailed error message"
    }
    ```
  version: 1.0.0
  contact:
    name: API Support
    email: api@election-system.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Local development
  - url: https://staging-api.election-system.com/api/v1
    description: Staging environment
  - url: https://api.election-system.com/api/v1
    description: Production environment

tags:
  - name: Authentication
    description: Voter and admin authentication
  - name: Votes
    description: Vote casting and retrieval
  - name: Elections
    description: Election management
  - name: Candidates
    description: Candidate management
  - name: IoT
    description: IoT terminal management
  - name: Audit
    description: Audit logs and compliance
  - name: Voters
    description: Voter management

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new voter
      description: Register voter with Aadhar and biometric template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - aadharNumber
                - biometricTemplate
                - districtId
              properties:
                aadharNumber:
                  type: string
                  pattern: '^\d{12}$'
                  example: "123456789012"
                biometricTemplate:
                  type: string
                  description: SHA-256 hash of fingerprint
                  example: "a1b2c3d4e5f6..."
                districtId:
                  type: string
                  format: uuid
                  example: "d4d5fa69-2142-4e26-b7aa-8e5177a3d7bb"
                email:
                  type: string
                  format: email
                  example: "voter@example.com"
                phoneNumber:
                  type: string
                  example: "+911234567890"
      responses:
        '201':
          description: Voter registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Voter registered successfully"
                  voterId:
                    type: string
                    format: uuid
        '400':
          description: Invalid input or duplicate registration
        '500':
          description: Server error

  /auth/biometric:
    post:
      tags: [Authentication]
      summary: Authenticate voter with biometric
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - biometricTemplate
                - terminalId
              properties:
                biometricTemplate:
                  type: string
                terminalId:
                  type: string
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                    description: JWT token
                  voter:
                    $ref: '#/components/schemas/Voter'
        '401':
          description: Authentication failed

  /auth/admin/login:
    post:
      tags: [Authentication]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                  role:
                    type: string
                    enum: [admin, observer]

  /votes/cast:
    post:
      tags: [Votes]
      summary: Cast a vote
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - voterId
                - electionId
                - candidateId
                - district
                - biometricHash
                - terminalId
              properties:
                voterId:
                  type: string
                  format: uuid
                electionId:
                  type: string
                  format: uuid
                candidateId:
                  type: string
                  format: uuid
                district:
                  type: string
                  format: uuid
                biometricHash:
                  type: string
                terminalId:
                  type: string
      responses:
        '201':
          description: Vote cast successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  voteId:
                    type: string
                  blockchainTxId:
                    type: string
                  receipt:
                    type: object
        '400':
          description: Already voted or invalid data
        '401':
          description: Unauthorized

  /votes/verify/{voteId}:
    get:
      tags: [Votes]
      summary: Verify a cast vote
      description: Verify vote integrity and retrieve vote receipt details
      parameters:
        - name: voteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vote verification successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      voteId:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [CONFIRMED, PENDING, REJECTED]
                        example: CONFIRMED
                      blockchainTxId:
                        type: string
                        example: "0xabc123..."
                      timestamp:
                        type: string
                        format: date-time
                      verified:
                        type: boolean
                        example: true
        '404':
          description: Vote not found

  /votes/results/{electionId}:
    get:
      tags: [Votes]
      summary: Get election results
      parameters:
        - name: electionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: district
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            type: string
            enum: [PRELIMINARY, FINAL, RECOUNT]
      responses:
        '200':
          description: Results retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      electionId:
                        type: string
                        format: uuid
                      electionName:
                        type: string
                      status:
                        type: string
                        enum: [SCHEDULED, ACTIVE, COMPLETED, CANCELLED]
                      totalVotes:
                        type: integer
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            candidateId:
                              type: string
                              format: uuid
                            candidateName:
                              type: string
                            partyName:
                              type: string
                            voteCount:
                              type: integer
                            percentage:
                              type: number
                              format: float
                            rank:
                              type: integer
                      generatedAt:
                        type: string
                        format: date-time

  /elections:
    get:
      tags: [Elections]
      summary: List all elections
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Elections list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  elections:
                    type: array
                    items:
                      $ref: '#/components/schemas/Election'
    post:
      tags: [Elections]
      summary: Create new election
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ElectionInput'
      responses:
        '201':
          description: Election created
        '403':
          description: Admin access required

  /candidates:
    post:
      tags: [Candidates]
      summary: Add candidate to election
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - electionId
                - candidateName
                - partyName
              properties:
                electionId:
                  type: string
                  format: uuid
                candidateName:
                  type: string
                  example: "John Smith"
                partyName:
                  type: string
                  example: "Democratic Party"
                partySymbol:
                  type: string
                  example: "🦅"
                age:
                  type: integer
                  minimum: 25
                manifesto:
                  type: string
                photoUrl:
                  type: string
                  format: uri
      responses:
        '201':
          description: Candidate added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      candidateId:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [ACTIVE, WITHDRAWN, DISQUALIFIED]
        '400':
          description: Invalid input or duplicate candidate
        '403':
          description: Admin access required
        '422':
          description: Election not in SCHEDULED status

  /candidates/{electionId}:
    get:
      tags: [Candidates]
      summary: List candidates for an election
      parameters:
        - name: electionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Candidates retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      candidates:
                        type: array
                        items:
                          type: object
                          properties:
                            candidateId:
                              type: string
                              format: uuid
                            candidateName:
                              type: string
                            partyName:
                              type: string
                            partySymbol:
                              type: string
                            photoUrl:
                              type: string
                            age:
                              type: integer
                            status:
                              type: string
                              enum: [ACTIVE, WITHDRAWN, DISQUALIFIED]
        '404':
          description: Election not found

  /terminals:
    get:
      tags: [IoT]
      summary: List all IoT voting terminals
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ONLINE, OFFLINE, MAINTENANCE, COMPROMISED, TAMPERED]
        - name: districtId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Terminals retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      terminals:
                        type: array
                        items:
                          type: object
                          properties:
                            terminalId:
                              type: string
                            macAddress:
                              type: string
                            districtId:
                              type: string
                              format: uuid
                            status:
                              type: string
                            lastHeartbeat:
                              type: string
                              format: date-time
                            batteryLevel:
                              type: integer
                            tamperSealIntact:
                              type: boolean
        '403':
          description: Admin access required

  /terminals/authorize:
    post:
      tags: [IoT]
      summary: Authorize a new terminal by MAC address
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - terminalId
                - macAddress
                - districtId
              properties:
                terminalId:
                  type: string
                  example: "TERM-001"
                macAddress:
                  type: string
                  pattern: '^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$'
                  example: "00:1B:44:11:3A:B7"
                districtId:
                  type: string
                  format: uuid
                pollingStation:
                  type: string
      responses:
        '201':
          description: Terminal authorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      terminalId:
                        type: string
                      authorized:
                        type: boolean
                      authorizedAt:
                        type: string
                        format: date-time
        '400':
          description: Invalid MAC address or duplicate terminal
        '403':
          description: Admin access required

  /audit:
    get:
      tags: [Audit]
      summary: Get audit logs
      security:
        - bearerAuth: []
      parameters:
        - name: eventType
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Audit logs retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  pagination:
                    type: object

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Voter:
      type: object
      properties:
        voterId:
          type: string
          format: uuid
        aadharNumber:
          type: string
        districtId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        status:
          type: string
          enum: [ACTIVE, BLOCKED, PENDING]
        createdAt:
          type: string
          format: date-time

    Election:
      type: object
      properties:
        electionId:
          type: string
          format: uuid
        electionName:
          type: string
        electionType:
          type: string
          enum: [GENERAL, LOCAL, REFERENDUM, BY_ELECTION]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [SCHEDULED, ACTIVE, COMPLETED, CANCELLED]

    ElectionInput:
      type: object
      required:
        - electionName
        - electionType
        - startDate
        - endDate
      properties:
        electionName:
          type: string
        electionType:
          type: string
          enum: [GENERAL, LOCAL, REFERENDUM]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        description:
          type: string

    AuditLog:
      type: object
      properties:
        _id:
          type: string
        eventType:
          type: string
        userId:
          type: string
        timestamp:
          type: string
          format: date-time
        success:
          type: boolean
        ipAddress:
          type: string
        metadata:
          type: object
