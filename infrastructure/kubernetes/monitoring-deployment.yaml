apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: election-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
          - "--config.file=/etc/prometheus/prometheus.yml"
          - "--storage.tsdb.path=/prometheus"
          - "--web.enable-lifecycle"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-data
          mountPath: /prometheus
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
      - name: prometheus-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: election-system
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: election-system
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'election-system'
    rule_files:
      - /etc/prometheus/alerting_rules.yml
    scrape_configs:
      - job_name: 'backend-api'
        static_configs:
          - targets: ['backend-service:80']
        metrics_path: '/metrics'
      - job_name: 'fabric-peer'
        static_configs:
          - targets: ['peer0.electioncommission.election.com:9444']
      - job_name: 'postgres-exporter'
        static_configs:
          - targets: ['postgres-exporter:9187']
      - job_name: 'mongodb-exporter'
        static_configs:
          - targets: ['mongodb-exporter:9216']
      - job_name: 'redis-exporter'
        static_configs:
          - targets: ['redis-exporter:9121']
      - job_name: 'kafka-jmx'
        static_configs:
          - targets: ['kafka:9101']
      - job_name: 'ml-analytics'
        static_configs:
          - targets: ['ml-analytics:5000']
        metrics_path: '/metrics'
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
  alerting_rules.yml: |
    groups:
      - name: election_alerts
        rules:
          - alert: HighAPIErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High API error rate detected"
              description: "Error rate is {{ $value | humanizePercentage }} over last 5 minutes"

          - alert: KafkaConsumerLag
            expr: kafka_consumer_group_lag > 1000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Kafka consumer lag exceeding threshold"
              description: "Consumer group lag is {{ $value }} messages"

          - alert: FraudAlertSpike
            expr: increase(fraud_alerts_total[10m]) > 20
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Fraud alert spike detected"
              description: "{{ $value }} fraud alerts in the last 10 minutes"

          - alert: BackendDown
            expr: up{job="backend-api"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Backend API is down"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: election-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"  # Change in production
        - name: GF_PROVISIONING_PATH
          value: "/etc/grafana/provisioning"
        volumeMounts:
        - name: grafana-data
          mountPath: /var/lib/grafana
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: grafana-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: election-system
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30004
  type: NodePort
