apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: election-ingress
  namespace: election-system
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    # WebSocket upgrade support
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
  - hosts:
    - api.election-system.com
    - vote.election-system.com
    - observe.election-system.com
    - admin.election-system.com
    - grafana.election-system.com
    secretName: election-tls
  rules:
  - host: api.election-system.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
  - host: vote.election-system.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: voter-ui
            port:
              number: 80
  - host: observe.election-system.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: observer-dashboard
            port:
              number: 80
  - host: admin.election-system.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-portal
            port:
              number: 80
  - host: grafana.election-system.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
