name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Run ESLint
        run: cd backend && npm run lint
      - name: Dependency Vulnerability Check
        run: cd backend && npm audit --audit-level=high

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Run Jest
        run: cd backend && npm run test

  lint-python:
    name: Lint ML Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd ml-service
          pip install -r requirements.txt flake8
      - name: Flake8 Linter
        run: cd ml-service && flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, lint-python]
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend Image
        run: docker build -t election-backend:test -f infrastructure/docker/Dockerfile.backend ./backend
      - name: Build ML Service Image
        run: docker build -t election-ml-service:test -f infrastructure/docker/Dockerfile.ml ./ml-service

  dast-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - uses: actions/checkout@v4
      - name: Start Staging Docker Environment
        run: docker-compose up -d backend mongodb postgres redis
      - name: Sleep for Services to be Ready
        run: sleep 30
      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

  deploy-staging:
    name: Deploy to Staging Cluster
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [dast-scan]
    steps:
      - name: Simulate Staging DB/K8s Deploy
        run: echo "🚀 Automated deploy to staging cluster initiated."
